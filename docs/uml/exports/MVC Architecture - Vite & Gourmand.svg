font-size="12" lengthAdjust="spacing" textLength="82" x="257" y="184.8633">Business logic</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122" x="257" y="199.957">Request orchestration</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3" x="257" y="215.0508">&#160;</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="81" x="257" y="230.1445">src/controllers/</text></g><!--entity Models--><g id="elem_Models"><rect fill="#7CB89F" height="110.5625" rx="2.5" ry="2.5" style="stroke:#063A1F;stroke-width:2.0;" width="165" x="361.5" y="320.2188"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="40" x="371.5" y="342.6758">Models</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="114" x="371.5" y="357.7695">&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="126" x="371.5" y="372.8633">Database access layer</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145" x="371.5" y="387.957">CRUD operations via PDO</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3" x="371.5" y="403.0508">&#160;</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65" x="371.5" y="418.1445">src/models/</text></g><!--entity Views--><g id="elem_Views"><rect fill="#D4C5A0" height="110.5625" rx="2.5" ry="2.5" style="stroke:#063A1F;stroke-width:2.0;" width="138" x="169" y="320.2188"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="33" x="179" y="342.6758">Views</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="114" x="179" y="357.7695">&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="118" x="179" y="372.8633">HTML/PHP templates</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="82" x="179" y="387.957">Data rendering</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3" x="179" y="403.0508">&#160;</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="54" x="179" y="418.1445">src/views/</text></g><!--entity Browser--><g id="elem_Browser"><rect fill="#E8E8E0" height="50.1875" rx="2.5" ry="2.5" style="stroke:#063A1F;stroke-width:2.0;" width="96" x="7" y="162.7188"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="46" x="17" y="185.1758">Browser</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="76" x="17" y="200.2695">(Client / User)</text></g><!--entity Database--><g id="elem_Database"><rect fill="#6BA876" height="80.375" rx="2.5" ry="2.5" style="stroke:#063A1F;stroke-width:2.0;" width="134" x="648" y="335.7188"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="54" x="658" y="358.1758">Database</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="114" x="658" y="373.2695">&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="112" x="658" y="388.3633">MySQL &#8212; Relational</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="112" x="658" y="403.457">MongoDB &#8212; NoSQL</text></g><g id="elem_GMN18"><path d="M507.5,494.2188 L507.5,685.3438 A0,0 0 0 0 507.5,685.3438 L922.5,685.3438 A0,0 0 0 0 922.5,685.3438 L922.5,504.2188 L912.5,494.2188 L719,494.2188 L715,416.0988 L711,494.2188 L507.5,494.2188 A0,0 0 0 0 507.5,494.2188 " fill="#FEFFDD" style="stroke:#063A1F;stroke-width:0.5;"/><path d="M912.5,494.2188 L912.5,504.2188 L922.5,504.2188 L912.5,494.2188 " fill="#FEFFDD" style="stroke:#063A1F;stroke-width:0.5;"/><text fill="#333333" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="130" x="513.5" y="511.6758">MVC Request Lifecycle</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="253" x="646.5" y="511.6758">&#8212; How Vite &amp; Gourmand processes requests:</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3" x="513.5" y="526.7695">&#160;</text><ellipse cx="519" cy="537" fill="#333333" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="345" x="525.5" y="541.8633">Browser sends HTTP request (user clicks link or submits form)</text><ellipse cx="519" cy="552.0938" fill="#333333" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="382" x="525.5" y="556.957">Controller receives request, validates input, calls appropriate Model(s)</text><ellipse cx="519" cy="567.1875" fill="#333333" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="344" x="525.5" y="572.0508">Model(s) execute database queries via PDO or MongoDB driver</text><ellipse cx="519" cy="582.2813" fill="#333333" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="222" x="525.5" y="587.1445">Database returns data (results or errors)</text><ellipse cx="519" cy="597.375" fill="#333333" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="223" x="525.5" y="602.2383">Model returns data object(s) to Controller</text><ellipse cx="519" cy="612.4688" fill="#333333" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="168" x="525.5" y="617.332">Controller passes data to View</text><ellipse cx="519" cy="627.5625" fill="#333333" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="328" x="525.5" y="632.4258">View renders HTML template with data and sends response</text><ellipse cx="519" cy="642.6563" fill="#333333" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="300" x="525.5" y="647.5195">Browser receives HTML response and displays to user</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3" x="513.5" y="662.6133">&#160;</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="382" x="513.5" y="677.707">This separation ensures clean code, easy testing, and maintainability.</text></g><!--link Browser to Controllers--><g id="link_Browser_Controllers"><path d="M103.24,187.7188 C143.43,187.7188 195.24,187.7188 240.76,187.7188 " fill="none" id="Browser-to-Controllers" style="stroke:#666666;stroke-width:2.0;"/><polygon fill="#666666" points="246.76,187.7188,237.76,183.7188,241.76,187.7188,237.76,191.7188,246.76,187.7188" style="stroke:#666666;stroke-width:2.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="99" x="125.5" y="166.1758">(1) HTTP Request</text><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="96" x="127" y="181.2695">(e.g., GET, POST)</text></g><!--link Controllers to Models--><g id="link_Controllers_Models"><path d="M389.27,232.2987 C403.37,243.9588 416.68,257.7088 426,273.2188 C434.39,287.1788 438.1344,298.1153 440.7044,314.0453 " fill="none" id="Controllers-to-Models" style="stroke:#666666;stroke-width:2.0;"/><polygon fill="#666666" points="441.66,319.9688,444.1755,310.4466,440.8636,315.0326,436.2776,311.7207,441.66,319.9688" style="stroke:#666666;stroke-width:2.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="79" x="434" y="286.6758">(2) Query Data</text></g><!--reverse link Controllers to Models--><g id="link_Controllers_Models"><path d="M306.0553,249.261 C305.2453,265.191 307.37,276.1088 315,290.2188 C325.56,309.7688 342.84,325.5188 361.36,337.8888 " fill="none" id="Controllers-backto-Models" style="stroke:#666666;stroke-width:2.0;"/><polygon fill="#666666" points="306.36,243.2688,301.9081,252.054,306.1061,248.2623,309.8978,252.4603,306.36,243.2688" style="stroke:#666666;stroke-width:2.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="101" x="316" y="286.6758">Populated Objects</text></g><!--link Models to Database--><g id="link_Models_Database"><path d="M526.78,375.7188 C565.54,375.7188 605.12,375.7188 641.71,375.7188 " fill="none" id="Models-to-Database" style="stroke:#666666;stroke-width:2.0;"/><polygon fill="#666666" points="647.71,375.7188,638.71,371.7188,642.71,375.7188,638.71,379.7188,647.71,375.7188" style="stroke:#666666;stroke-width:2.0;"/><text fill="#333333" font-family="sans-serif" font-size="12" lengthAdjus